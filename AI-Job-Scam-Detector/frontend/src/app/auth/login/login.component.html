<div class="login-container">
  <div class="login-card">

    <h2 class="title">AI Scam Detection</h2>
    <p class="subtitle">Secure Login</p>

    <form (ngSubmit)="login()">

      <div class="form-group">
        <input 
          type="email"
          class="form-control"
          placeholder="Email"
          [(ngModel)]="loginData.email"
          name="email"
          required>
      </div>

      <div class="form-group">
        <input
          type="password"
          class="form-control"
          placeholder="Password"
          [(ngModel)]="loginData.password"
          name="password"
          required>
      </div>

      <button
        type="submit"
        class="btn btn-primary w-100">
        Login
      </button>

    </form>

    <p class="footer">
      AI Powered Fraud Detection
    </p>

  </div>
</div>
